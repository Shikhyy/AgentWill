<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111127"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="800" y2="100" stroke="white"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="white"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="white"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="white"/>
    <line x1="100" y1="0" x2="100" y2="600" stroke="white"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="white"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="white"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="white"/>
  </g>

  <!-- Human icon -->
  <g transform="translate(100, 180)" filter="url(#glow)">
    <circle cx="30" cy="20" r="20" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M0 80 Q30 50 60 80" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="30" cy="20" r="5" fill="#8b5cf6"/>
    <text x="30" y="120" text-anchor="middle" fill="#8b5cf6" font-size="14" font-family="sans-serif">Human</text>
  </g>

  <!-- Agent icon -->
  <g transform="translate(580, 180)" filter="url(#glow)">
    <rect x="5" y="5" width="50" height="50" rx="10" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="20" cy="25" r="3" fill="#3b82f6"/>
    <circle cx="40" cy="25" r="3" fill="#3b82f6"/>
    <path d="M20 38 Q30 45 40 38" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <text x="30" y="80" text-anchor="middle" fill="#3b82f6" font-size="14" font-family="sans-serif">Agent</text>
  </g>

  <!-- Connection lines -->
  <g opacity="0.3">
    <path d="M160 230 Q300 150 350 200" stroke="url(#glow1)" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
    <path d="M350 200 Q400 250 450 200" stroke="url(#glow1)" stroke-width="2" fill="none"/>
  </g>

  <!-- Rules block -->
  <g transform="translate(330, 150)" filter="url(#glow)">
    <rect x="0" y="0" width="140" height="100" rx="12" fill="#1a1a2e" stroke="url(#glow1)" stroke-width="2"/>
    <text x="70" y="35" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" font-weight="bold">AGENTWILL</text>
    <line x1="20" y1="50" x2="120" y2="50" stroke="#333" stroke-width="1"/>
    <text x="25" y="65" fill="#666" font-size="9" font-family="monospace">daily_limit: $1000</text>
    <text x="25" y="78" fill="#666" font-size="9" font-family="monospace">per_tx: $100</text>
    <text x="25" y="91" fill="#666" font-size="9" font-family="monospace">targets: [uniswap]</text>
  </g>

  <!-- Arrows with labels -->
  <g filter="url(#glow)">
    <path d="M230 200 L320 200" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="260" y="190" fill="#8b5cf6" font-size="9" font-family="sans-serif">define rules</text>
    
    <path d="M480 200 L570 200" stroke="#3b82f6" stroke-width="2"/>
    <text x="505" y="190" fill="#3b82f6" font-size="9" font-family="sans-serif">verify</text>
    <circle cx="525" cy="200" r="4" fill="#3b82f6"/>
  </g>

  <!-- Floating particles -->
  <circle cx="200" cy="400" r="2" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="350" cy="380" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="500" cy="420" r="2" fill="#06b6d4" opacity="0.5"/>
  <circle cx="600" cy="390" r="3" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="250" cy="450" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="450" cy="460" r="2" fill="#06b6d4" opacity="0.5"/>
  <circle cx="150" cy="350" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="650" cy="440" r="2" fill="#3b82f6" opacity="0.4"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="white" font-size="24" font-family="sans-serif" font-weight="bold">How AgentWill Works</text>
</svg>
